name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - name: validate semantic PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            ci
            build
            style
            revert
          requireScope: false
          subjectPattern: ^[a-z].*[^.]$
          subjectPatternError: |
            The subject of the PR title MUST start with a lowercase letter
            and MUST NOT end with a period. See .cursor/rules/commit-conventions.mdc.
          wip: true
