name: free-tier-burn

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      threshold:
        description: "Quota burn threshold (0.0-1.0). Defaults to 0.70 per .cursor/rules/free-tier-budget.mdc."
        required: false
        default: "0.70"

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.0.0"

jobs:
  free-tier-burn:
    name: free-tier-burn
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: run quota burn check
        env:
          ATLAS_PUBLIC_KEY: ${{ secrets.ATLAS_PUBLIC_KEY }}
          ATLAS_PRIVATE_KEY: ${{ secrets.ATLAS_PRIVATE_KEY }}
          ATLAS_GROUP_ID: ${{ secrets.ATLAS_GROUP_ID }}
          ATLAS_CLUSTER_NAME: ${{ secrets.ATLAS_CLUSTER_NAME }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUOTA_BURN_THRESHOLD: ${{ inputs.threshold || '0.70' }}
        run: pnpm tsx scripts/free-tier-quota-burn.ts
