name: Merge on CI green

# Workflow-based substitute for branch protection (paywalled on free private repos).
# Squash-merges PRs once CI is green + PR is mergeable + base=main + non-draft.
#
# Since this is a solo-developer repo, the approval requirement is bypassed —
# opening the PR is the equivalent of approval. CI green is the only gate.

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write
  checks: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  maybe-merge:
    name: Merge if CI green
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'check_suite' &&
       github.event.check_suite.conclusion == 'success' &&
       github.event.check_suite.pull_requests[0] != null) ||
      (github.event_name == 'pull_request')
    steps:
      - name: Identify the PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              PR_NUM="${{ github.event.pull_request.number }}"
              ;;
            check_suite)
              PR_NUM="${{ github.event.check_suite.pull_requests[0].number }}"
              ;;
            *)
              echo "Unexpected event: ${{ github.event_name }}"
              exit 1
              ;;
          esac
          echo "number=$PR_NUM" >> $GITHUB_OUTPUT
          echo "Identified PR #$PR_NUM"

      - name: Check merge conditions
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"

          PR_JSON=$(gh pr view "$PR_NUM" --repo "$REPO" \
            --json mergeable,mergeStateStatus,state,isDraft,baseRefName,statusCheckRollup)

          IS_DRAFT=$(echo "$PR_JSON" | jq -r '.isDraft')
          STATE=$(echo "$PR_JSON" | jq -r '.state')
          BASE=$(echo "$PR_JSON" | jq -r '.baseRefName')
          MERGEABLE=$(echo "$PR_JSON" | jq -r '.mergeable')

          if [ "$IS_DRAFT" = "true" ] || [ "$STATE" != "OPEN" ] || [ "$BASE" != "main" ]; then
            echo "Skipping: draft=$IS_DRAFT state=$STATE base=$BASE"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check all status checks are successful
          FAILED=$(echo "$PR_JSON" | jq -r '[.statusCheckRollup[] | select(.status == "COMPLETED" and .conclusion != "SUCCESS" and .conclusion != "NEUTRAL" and .conclusion != "SKIPPED")] | length')
          PENDING=$(echo "$PR_JSON" | jq -r '[.statusCheckRollup[] | select(.status != "COMPLETED")] | length')

          if [ "$FAILED" != "0" ]; then
            echo "Skipping: $FAILED check(s) failed."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$PENDING" != "0" ]; then
            echo "Skipping: $PENDING check(s) still pending."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$MERGEABLE" != "MERGEABLE" ]; then
            echo "Skipping: mergeable=$MERGEABLE (conflicts or other blocker)."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "All gates pass -- proceeding to merge."

      - name: Squash-merge
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"
          echo "Squash-merging PR #$PR_NUM"
          gh pr merge "$PR_NUM" --repo "$REPO" --squash --delete-branch \
            || echo "Merge failed (may already be merged or have new conflicts)."
