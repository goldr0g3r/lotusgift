# LotusGift v2 — OpenTelemetry Collector configuration (local dev).
#
# Bundled into otel/opentelemetry-collector-contrib:0.152.0 via the
# --config=/etc/otel-collector-config.yaml command override in
# infrastructure/docker/docker-compose.yml.
#
# Local-dev role: accept OTLP from apps/api-gateway (P4+) + every Nest service
# library, batch, print to stdout. No cloud destination. P21 (observability
# hardening) swaps `debug` -> `otlp` exporter to Grafana Cloud / Tempo / Loki.
#
# Citations + decisions: docs/research/phase-0-dev-stack.md.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    # Defaults appropriate for local dev (low volume, interactive).
    # P21 tunes per pipeline once real traffic shapes emerge.
    timeout: 200ms
    send_batch_size: 8192
    send_batch_max_size: 0

exporters:
  # Pretty-prints traces/metrics/logs to the collector's stdout
  # (visible via `docker compose logs -f otel-collector`).
  # The exporter was renamed from `logging` -> `debug` in v0.86; pinning to
  # v0.152.0 keeps this name stable.
  debug:
    verbosity: normal

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info
