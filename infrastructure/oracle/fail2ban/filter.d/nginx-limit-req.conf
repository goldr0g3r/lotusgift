# LotusGift v2 — fail2ban filter for nginx limit_req_zone violations.
#
# Matches nginx error.log lines emitted when a client exceeds the
# limit_req_zone defined in /etc/nginx/nginx.conf (zone=api_rl).
#
# Example matched lines:
#   2026/05/13 09:34:56 [error] 12345#0: *678 limiting requests, excess: 0.456 by zone "api_rl", client: 198.51.100.42, server: api.lotusgift.com, request: "GET /api/products HTTP/2.0", host: "api.lotusgift.com"

[INCLUDES]
before = common.conf

[Definition]
# nginx error log line shape:
#   2026/05/13 09:34:56 [error] 12345#0: *678 limiting requests, ... client: <HOST>, ...
# The date + time tokens (two whitespace-separated fields) sit before
# `[error]`; allow both (and any optional log-prefix wrapper).
failregex = ^\s*\S+\s+\S+\s+\[error\]\s+\d+#\d+:\s+\*\d+\s+limiting requests,.*client:\s+<HOST>,
ignoreregex =

[Init]
journalmatch = _SYSTEMD_UNIT=nginx.service
