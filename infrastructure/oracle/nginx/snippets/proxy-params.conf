# Shared reverse-proxy parameters for upstream Node services.
#
# Used by all `proxy_pass http://127.0.0.1:3001...` locations in
# /etc/nginx/sites-available/*.conf.

proxy_http_version 1.1;

# Forward real client IP + scheme to the api-gateway (logged + used for
# rate-limiting + audit).
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

# WebSocket upgrade headers — Better-Auth's `/api/auth/sign-in/passkey` flow
# (P5+) uses a WebRTC-adjacent upgrade for native authenticators; in-app
# message thread (P8b customization) may use WS.
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Sensible timeouts — Node should respond in <30s; if it doesn't, abort and
# let the client retry rather than holding the connection open.
proxy_connect_timeout 10s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

# Buffer settings — defaults are tuned for small JSON responses. Override per
# location if a specific endpoint streams larger payloads (e.g. file
# downloads from R2 proxied through the gateway).
proxy_buffering          on;
proxy_buffer_size        8k;
proxy_buffers            16 8k;

# Don't leak nginx-version through error pages.
proxy_hide_header X-Powered-By;
