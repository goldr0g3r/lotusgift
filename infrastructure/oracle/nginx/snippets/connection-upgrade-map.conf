# `Connection` header pass-through map for WebSocket upgrades.
#
# Must live OUTSIDE any server{} block (in http{} scope), so this is included
# from nginx.conf rather than from a vhost.
#
# The proxy-params.conf snippet uses $connection_upgrade in
#   proxy_set_header Connection $connection_upgrade;
# This map keeps Connection: upgrade for WebSocket clients and Connection:
# close otherwise.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
