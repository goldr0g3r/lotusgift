# LotusGift v2 — security response headers shared across all vhosts.
#
# Add new headers here, not in per-vhost configs, so the same baseline applies
# to api / vendor / admin / cs subdomains uniformly. Decisions captured in
# docs/research/phase-0-oracle-runbook.md.

# HSTS preload-eligible (2 years + includeSubDomains + preload). Submit the
# apex domain to https://hstspreload.org/ at P22 launch.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Defense-in-depth — Better-Auth + Razorpay never want this domain framed,
# and the api-gateway doesn't render HTML so DENY is safe.
add_header X-Frame-Options DENY always;

# Prevent MIME-sniffing on uploaded customization art (P8b).
add_header X-Content-Type-Options nosniff always;

# Suppress old-IE XSS filter (modern browsers ignore; setting "0" disables
# legacy heuristics that have been weaponised in the past).
add_header X-XSS-Protection "0" always;

# Don't leak the full URL to third-party origins on outbound clicks.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Drop FLoC + topic-tracking opt-ins entirely; corporate buyers don't want
# ad-tech surface area.
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;

# CSP — start report-only, no enforcement (the api-gateway returns JSON, not
# HTML, but a future docs/swagger endpoint may render). P4 will tighten this.
add_header Content-Security-Policy-Report-Only "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
