# Let's Encrypt HTTP-01 challenge location.
#
# Used by the :80 server block of every LotusGift vhost so Certbot can issue
# + renew certificates without taking nginx offline.
#
# Certbot writes challenge tokens under /var/www/letsencrypt/.well-known/
# acme-challenge/<token> (configured via the bootstrap script's `--webroot
# -w /var/www/letsencrypt`).

location ^~ /.well-known/acme-challenge/ {
    default_type "text/plain";
    root /var/www/letsencrypt;
    access_log off;
    log_not_found off;
}

# Discourage curious humans from poking around /.well-known/.
location = /.well-known/acme-challenge/ {
    return 404;
}
