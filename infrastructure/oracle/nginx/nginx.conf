# LotusGift v2 — host-side nginx main config (Oracle A1.Flex VM).
#
# Source-of-truth for /etc/nginx/nginx.conf. Diff with the on-host copy via:
#   sudo diff /etc/nginx/nginx.conf infrastructure/oracle/nginx/nginx.conf
#
# Distro defaults (Ubuntu 24.04 nginx 1.27.x from nginx.org repo) replaced
# with a hardened baseline: HTTP/2 + TLS 1.3 + Mozilla Intermediate ciphers +
# OCSP stapling + security headers via snippets.

user www-data;
worker_processes auto;
worker_rlimit_nofile 16384;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 25m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Response compression is OFF at the http{} level because the api-gateway
    # serves JSON (small payloads, gzip ratio is marginal) and because keeping
    # it OFF avoids any future temptation to compress webhook RESPONSE bodies
    # that some carrier dashboards proxy back into signature checks. The
    # actual Razorpay-webhook body-integrity guarantee comes from
    # `proxy_request_buffering off` on the /api/payments/webhook location
    # (which preserves the REQUEST body byte-for-byte for HMAC verification).
    gzip off;

    # Rate-limit zone shared across the api-gateway upstream; fail2ban watches
    # the access log for 429s and bans repeat offenders via the
    # nginx-limit-req filter (infrastructure/oracle/fail2ban/filter.d/).
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;

    # Real client IP from Cloudflare (DNS-only mode for PR-7, so this is a
    # no-op until the proxy mode flips at P22). When the proxy is enabled,
    # uncomment the set_real_ip_from blocks for Cloudflare's IP ranges.
    real_ip_header CF-Connecting-IP;
    # set_real_ip_from 173.245.48.0/20;
    # (...full Cloudflare list documented in the runbook §9.)

    # Connection-upgrade map for WebSocket support (must live in http{} scope,
    # outside any server{}).
    include /etc/nginx/snippets/connection-upgrade-map.conf;

    log_format json escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status"'
        '}';
    access_log /var/log/nginx/access.log json;

    # Site configs.
    include /etc/nginx/sites-enabled/*;
}
