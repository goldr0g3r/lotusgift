# LotusGift v2 — api-gateway reverse-proxy vhost.
#
# Two server blocks:
#   1. :80    — ACME challenge + permanent redirect to :443
#   2. :443   — HTTP/2 + TLS 1.3 reverse proxy to 127.0.0.1:3001
#
# ${LOTUSGIFT_API_HOST} is replaced at install time by the runbook step:
#   sudo sed -i "s/\${LOTUSGIFT_API_HOST}/api.lotusgift.com/g" \
#     /etc/nginx/sites-available/api.lotusgift.com.conf
# (Repo file keeps the placeholder so the audit-drift diff stays meaningful.)
#
# Symlink to enable:
#   sudo ln -s /etc/nginx/sites-available/api.lotusgift.com.conf \
#              /etc/nginx/sites-enabled/api.lotusgift.com.conf

# Port :80 — ACME + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name ${LOTUSGIFT_API_HOST};

    # Certbot HTTP-01 challenge.
    include /etc/nginx/snippets/letsencrypt-acme.conf;

    # Everything else: permanent redirect to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# Port :443 — HTTPS reverse proxy.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${LOTUSGIFT_API_HOST};

    # TLS termination.
    ssl_certificate     /etc/letsencrypt/live/${LOTUSGIFT_API_HOST}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${LOTUSGIFT_API_HOST}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${LOTUSGIFT_API_HOST}/chain.pem;

    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Body size matches docker-compose.prod.yml client_max_body_size — Razorpay
    # webhooks + customization art uploads (P8b) push up to ~20 MB.
    client_max_body_size 25m;

    # Liveness probe carved out from rate limiting so the deploy/verify job
    # never gets 429'd during a rapid rollout.
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:3001/healthz;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Razorpay webhook needs the raw body (HMAC-SHA256 signature verification
    # in payment-service P10). The proxy-params snippet preserves Content-Type
    # + Content-Length without buffering. The api-gateway P4 main.ts sets up
    # bodyParser: false for /api/payments/webhook so the raw body is intact.
    location = /api/payments/webhook {
        access_log /var/log/nginx/webhook.log json;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:3001/api/payments/webhook;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Everything else: rate-limited + reverse-proxied to the api-gateway.
    location / {
        limit_req zone=api_rl burst=40 nodelay;
        proxy_pass http://127.0.0.1:3001;
        include /etc/nginx/snippets/proxy-params.conf;
    }
}
